name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'app/**' # Only trigger if files inside the app folder change

env:
  REGISTRY_USER: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: devsecops-monorepo-app

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SAST Scan via SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=YOUR_SONARCLOUD_ORG_KEY_HERE
            -Dsonar.projectKey=YOUR_SONARCLOUD_PROJECT_KEY_HERE

  build-and-scan:
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Checkov IaC Configuration Scan (Evaluates Helm templates)
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./gitops/my-app
          framework: helm
          soft_fail: true # Logs errors without blocking while you calibrate policies

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t $REGISTRY_USER/$IMAGE_NAME:${{ github.sha }} ./app

      # 3. Container Scan via Trivy
      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '1' # Fail pipeline if CRITICAL vulnerabilities exist
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push Docker Image
        run: docker push $REGISTRY_USER/$IMAGE_NAME:${{ github.sha }}

  update-manifest:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }} # Needs PAT to write back to the repo

      # 4. In-place modification of values.yaml using sed
      - name: Update Image Tag in Helm values
        run: |
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/g' ./gitops/my-app/values.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./gitops/my-app/values.yaml
          # Use [skip ci] out of caution to ensure GitHub Actions ignores this push
          git commit -m "chore(gitops): automated container tag sync to ${{ github.sha }} [skip ci]"
          git push